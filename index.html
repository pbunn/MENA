<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>มีอะไรจะบอก... ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Mitr:wght@300;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --purple-bg: #E6E6FA;
            --pink-bg: #FFD1DC;
            --envelope-color: #ff8fa3;
            --paper-color: white;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Mitr', sans-serif;
            background-color: var(--purple-bg);
            transition: background-color 1s ease;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- หน้าใส่รหัส --- */
        #passwordPage {
            position: fixed;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }

        .pass-input {
            padding: 12px;
            font-size: 1.2rem;
            border-radius: 10px;
            border: 2px solid #9370DB;
            text-align: center;
            outline: none;
            width: 200px;
            margin-bottom: 15px;
        }

        /* --- ซองจดหมาย --- */
        #envelopeContainer {
            display: none;
            position: relative;
            z-index: 10;
        }

        .envelope-wrapper {
            position: relative;
            width: 300px;
            height: 200px;
            background-color: var(--envelope-color);
            border-radius: 0 0 5px 5px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .envelope-wrapper::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 5;
            border-top: 110px solid #ffb3c1;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.5s ease;
        }

        .envelope-front {
            position: absolute;
            bottom: 0;
            z-index: 4;
            width: 0;
            height: 0;
            border-top: 100px solid transparent;
            border-right: 150px solid var(--envelope-color);
            border-bottom: 100px solid var(--envelope-color);
            border-left: 150px solid #ffb3c1;
            border-radius: 0 0 5px 5px;
        }

        .paper {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 270px;
            height: 180px;
            background: var(--paper-color);
            padding: 20px;
            text-align: center;
            transition: all 1s ease;
            z-index: 2;
            box-sizing: border-box;
            border-radius: 5px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .open .envelope-wrapper::before {
            transform: rotateX(180deg);
            z-index: 1;
        }

        .open .paper {
            transform: translate(-50%, -220px);
            height: 380px;
            width: 320px;
            z-index: 6;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .content-area {
            opacity: 0;
            transition: opacity 0.5s;
            width: 100%;
        }

        .open .content-area {
            opacity: 1;
        }

        h1 { font-size: 1.5rem; color: #5D3FD3; margin-bottom: 20px; }
        .page-2-text { color: #FF4D6D !important; }

        button {
            padding: 10px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Mitr', sans-serif;
            transition: 0.2s;
        }

        .next-btn { background-color: #9370DB; color: white; }
        .yes-btn { background-color: #FF4D6D; color: white; }
        .no-btn { background-color: #A9A9A9; color: white; position: absolute; }

        .hidden { display: none !important; }
    </style>
</head>
<body id="mainBody">

    <div id="passwordPage">
        <h1 style="color: #5D3FD3;">วันที่เราเริ่มคุยกันคือวันที่เท่าไหร่</h1>
        <p style="color: #666; margin-bottom: 20px;">(ใบ้ให้: ใส่เลข 4 หลักนะเทอ)</p>
        <input type="text" id="passInput" class="pass-input" placeholder="ววดด" maxlength="4">
        <br>
        <button class="next-btn" onclick="checkPassword()">ส่งคำตอบ</button>
    </div>

    <div id="envelopeContainer">
        <div class="envelope-wrapper" id="envelopeWrapper">
            <div class="envelope-front"></div>
            <div class="paper" id="mainPaper">
                
                <div id="innerP1" class="content-area">
                    <h1>เทอคะเค้ามีอะไรจะถาม</h1>
                    <button class="next-btn" onclick="pullPaperMore()">--></button>
                </div>

                <div id="innerP2" class="content-area hidden">
                    <h1 id="questionText" class="page-2-text">เทอเป็นแฟนกับเค้าไหม</h1>
                    <div id="btnGroup">
                        <button class="yes-btn" onclick="celebrate()">ตกลง</button>
                        <button id="noBtn" class="no-btn" onmouseover="moveNoButton()" onclick="moveNoButton()">ไม่ตกลง</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script>
        // ฟังก์ชันตรวจสอบรหัสผ่าน
        function checkPassword() {
            const pass = document.getElementById('passInput').value;
            if (pass === "1402") { // ตั้งรหัสเป็น 1402
                document.getElementById('passwordPage').style.display = 'none';
                document.getElementById('envelopeContainer').style.display = 'block';
                
                setTimeout(() => {
                    document.getElementById('envelopeWrapper').classList.add('open');
                }, 500);
            } else {
                alert("คำตอบผิดนะเทอ ลองนึกใหม่สิคะ!");
            }
        }

        function pullPaperMore() {
            const body = document.getElementById('mainBody');
            const p1 = document.getElementById('innerP1');
            const p2 = document.getElementById('innerP2');

            p1.style.opacity = '0';
            setTimeout(() => {
                p1.classList.add('hidden');
                p2.classList.remove('hidden');
                body.style.backgroundColor = '#FFD1DC';
                setTimeout(() => {
                    p2.style.opacity = '1';
                }, 50);
            }, 400);
        }

        function moveNoButton() {
            const btn = document.getElementById('noBtn');
            const x = Math.random() * (window.innerWidth - 150);
            const y = Math.random() * (window.innerHeight - 100);
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function celebrate() {
            document.getElementById('questionText').innerHTML = "เย้! งั้นเธอเป็นแฟนเค้าแล้วนะ";
            document.getElementById('btnGroup').classList.add('hidden');
            document.getElementById('noBtn').classList.add('hidden');

            var duration = 5 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 10 };

            function randomInRange(min, max) { return Math.random() * (max - min) + min; }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();
                if (timeLeft <= 0) { return clearInterval(interval); }
                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        }
    </script>
</body>
</html>
